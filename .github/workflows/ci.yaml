name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Install dev deps
        run: uv sync --all-packages

      - name: Ruff lint
        run: uv run ruff check .

      - name: Deptry
        run: uv run deptry src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [core, cli, tui, "util"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Install workspace
        run: uv sync --all-groups

      - name: Run tests — ${{ matrix.package }}
        run: uv run pytest tests/${{ matrix.package }}

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v5

      - name: Install dev deps
        run: uv sync --all-groups

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version & changelog
        id: bump
        run: |
          OLD=$(uv run cz version --project)
          uv run cz bump --yes || EXIT=$?
          if [ "${EXIT:-0}" -eq 21 ]; then
            echo "Nothing to bump, skipping release"
            echo "new=" >> $GITHUB_OUTPUT
            exit 0
          fi
          # regenerate lock file 
          # and fold it into cz's commit
          uv lock
          git add uv.lock
          git commit --amend --no-edit
          NEW=$(uv run cz version --project)
          git tag -f -a "v$NEW" -m "Release v$NEW"
          echo "old=$OLD" >> $GITHUB_OUTPUT
          echo "new=$NEW" >> $GITHUB_OUTPUT

      - name: Push commit & tag
        if: steps.bump.outputs.new != ''
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git pull --rebase origin main
          git push origin main
          git push origin "v${{ steps.bump.outputs.new }}"

      - name: Build
        if: steps.bump.outputs.new != ''
        run: |
          cat CHANGELOG.md >> README.md
          uv build

      - name: Publish to PyPI
        if: steps.bump.outputs.new != ''
        run: uv publish dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
